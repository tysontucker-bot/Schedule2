<html>
<head>
  <script>
    function updateTime() {
      const now = new Date();
      const localTime = now.toLocaleString(); // Changed to local time
      document.getElementById('currentTime').innerText = localTime;
    }
    function updateDisplay() {
      updateTime();
    }
    setInterval(updateDisplay, 1000); // Keep interval for updating every second
  </script>
</head>
<body>
  <div id="currentTime"></div>
  <script>
    updateDisplay(); // Initialize on load
  </script>
</body>
</html>
