<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Schedule2</title>
  <script>
    let timeIntervalId;

    function updateTime() {
      const el = document.getElementById('currentTime');
      if (!el) return;

      const now = new Date();
      // Keep it simple; uses the user's locale/timezone.
      el.innerText = now.toLocaleString();
    }

    function startClock() {
      // Ensure the target element exists before starting.
      updateTime();

      // Clear any existing interval (prevents duplicates if startClock runs twice).
      if (timeIntervalId) clearInterval(timeIntervalId);
      timeIntervalId = setInterval(updateTime, 1000);
    }

    // Wait for DOM so #currentTime exists before setInterval tries to update it.
    document.addEventListener('DOMContentLoaded', startClock);
  </script>
</head>
<body>
  <div id="currentTime"></div>
</body>
</html>
