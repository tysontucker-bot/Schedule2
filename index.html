@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

html, body, #app {
  height: 100%;
  margin: 0;

}

body {

}

.schedule-board {

.schedule-container {

#currentTime {

}

#settingsToggle {

}

#settingsToggle:hover {

}

#meetingsToggle {

#videosToggle {

.video-links-container {

.draggable-video-frame .video-frame-close {

.video-link-close-btn {

.top-row, .bottom-row {

.timer-mask {

}

.modal-overlay.active {

.modal-content {

  border-radius:12px;

.modal-title {

.modal-search-group {

.modal-search-group input {

.modal-button-group button {

  border:3px solid black;
  border-radius:6px;
  font-weight:900;

  font-family:'Nunito',sans-serif;
  transition:.2s;
}

.modal-button-group button:hover {

  transform:scale(1.05);
}

.modal-button-group button:disabled {
  opacity:0.5;
  cursor:not-allowed;
}

.symbol-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(80px,1fr));
  gap:12px;
}

.symbol-item {
  width:80px;
  height:80px;
  border:3px solid black;
  border-radius:6px;
  display:flex;
  align-items:center;

}

.symbol-item:hover {
  transform:scale(1.1);
  background:#f0f0f0;
}

.symbol-item img {
  max-width:70px;
  max-height:70px;
  object-fit:contain;
}

.loading-spinner {
  text-align:center;
  padding:20px;
  font-weight:700;
}

  <script>

// Default schedule template
const defaultScheduleData = [
  { name:"Breakfast", time:"7:15", icon:"https://globalsymbols.com/uploads/production/image/imagefile/6256/14_6256_4ab7e0f6-4376-4c6d-8664-55cb0d0c2c2d.svg" },

  { name:"English", time:"8:30", icon:"https://d18vdu4p71yql0.cloudfront.net/libraries/mulberry/english.svg" },
  { name:"Attendance", time:"8:50", icon:"https://globalsymbols.com/uploads/production/image/imagefile/3120/13_3120_590a8d73-a9f5-49f6-9f26-9e1befbb2898.svg" },
  { name:"Recess", time:"8:55", icon:"https://globalsymbols.com/uploads/production/image/imagefile/15894/17_15895_8fbcb320-e261-4ebc-8834-8aeb58e5b03c.png" },

  { name:"Snack", time:"9:50", icon:"https://globalsymbols.com/uploads/production/image/imagefile/21820/17_21821_f58239d7-c408-4494-b7e7-d2808ddf08fa.png" },
  { name:"Math", time:"10:05", icon:"https://globalsymbols.com/uploads/production/image/imagefile/55337/120_55338_d6018f6e-ea20-43e6-9f4b-68e33fc67fc9.png" },
  { name:"PE", time:"10:40", icon:"https://d18vdu4p71yql0.cloudfront.net/libraries/mulberry/PE.svg.varianted-skin.svg" },
  { name:"Music", time:"11:00", icon:"https://d18vdu4p71yql0.cloudfront.net/libraries/noun-project/Music-24b69f41d0.svg" },
  { name:"Lunch", time:"11:30", icon:"https://d18vdu4p71yql0.cloudfront.net/libraries/mulberry/lunch 2.svg" },
  { name:"Swing", time:"12:00", icon:"https://globalsymbols.com/uploads/production/image/imagefile/46310/17_46311_4d68b6dc-e99c-462a-875f-c76297d2e2a8.png" },
  { name:"Rest", time:"12:30", icon:"https://globalsymbols.com/uploads/production/image/imagefile/3260/13_3260_8cd0ea5c-3d75-49bd-836a-526966edf6e6.svg" },
  { name:"Desk Work", time:"1:10", icon:"https://globalsymbols.com/uploads/production/image/imagefile/15657/17_15658_197b592f-bf8e-4879-b9b4-960bdaa27018.png" },
  { name:"Afternoon Meeting", time:"1:15", icon:"https://globalsymbols.com/uploads/production/image/imagefile/21487/17_21488_2252fa6e-4757-45be-b905-4760804fa3d5.png" },
  { name:"Television", time:"1:45", icon:"https://globalsymbols.com/uploads/production/image/imagefile/6268/14_6268_8b0276ac-2f63-4972-81bc-601383681b04.svg" },
  { name:"Bus", time:"2:10", icon:"https://globalsymbols.com/uploads/production/image/imagefile/3426/13_3426_bf2a3b9e-4973-466b-9c31-46e35e0b1d17.svg" }
];

let settingsMode = false;
let draggedCard = null;
let currentEditingCardIndex = -1;
let isWrappDragging = false;
let wrapperDragOffsetX = 0;
let wrapperDragOffsetY = 0;

// ========== HELPER FUNCTIONS ==========

async function saveScheduleRecord(record) {
  try {
    if (record.__backendId) {
      const result = await window.dataSdk.update(record);
      if (!result.isOk) {
        console.error("Failed to update record:", result.error);
      }
    } else {
      const { __backendId, ...recordData } = record;
      const result = await window.dataSdk.create(recordData);
      if (!result.isOk) {
        console.error("Failed to create record:", result.error);
      }
    }
  } catch (err) {
    console.error("Error saving record:", err);
  }
}

const row1 = document.getElementById("row1");
const row2 = document.getElementById("row2");

function createCardElement(item, index) {
  const card = document.createElement("div");
  card.className="schedule-card";
  card.dataset.index=index;

  const deleteBtn = document.createElement("button");
  deleteBtn.className = "delete-btn";
  deleteBtn.textContent = "✖";
  deleteBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    deleteCard(index);
  });
  card.appendChild(deleteBtn);

  const imageContainer = document.createElement("div");
  imageContainer.className="card-image-container";

  // Populate icon if it exists
  if (item.icon) {
    const img = document.createElement("img");
    img.src = item.icon;
    img.style.maxWidth = "70px";
    img.style.maxHeight = "70px";
    img.style.objectFit = "contain";
    img.loading = "lazy";
    img.addEventListener("error", () => {
      imageContainer.innerHTML = '<div style="width:60px;height:60px;background:#ddd;border-radius:4px;"></div>';
    });
    imageContainer.appendChild(img);
  } else {
    imageContainer.innerHTML = '<div style="width:60px;height:60px;background:#ddd;border-radius:4px;"></div>';
  }

  const nameDiv = document.createElement("div");
  nameDiv.className = "activity-name";
  nameDiv.textContent = item.name;

  const timeDisplay = document.createElement("div");
  timeDisplay.className = "time-display";
  timeDisplay.style.fontSize = ".7rem";
  timeDisplay.textContent = item.time;

  const timeInput = document.createElement("input");
  timeInput.className = "time-input";
  timeInput.type = "text";
  timeInput.value = item.time;

  timeInput.addEventListener("change", (e) => {
    schedule[index].time = e.target.value;
    timeDisplay.textContent = e.target.value;

    updateHighlight();
    saveScheduleRecord(schedule[index]);
  });

  card.appendChild(imageContainer);
  card.appendChild(nameDiv);
  card.appendChild(timeDisplay);
  card.appendChild(timeInput);

  card.addEventListener("click", (e) => {
    if (settingsMode && !e.target.classList.contains("delete-btn")) {
      timeInput.focus();
    } else if (!settingsMode) {
      openSymbolModal(index);
    }
  });

  card.addEventListener("dragstart", (e) => {
    if (settingsMode) {
      draggedCard = card;
      e.dataTransfer.effectAllowed = "move";
    }
  });

  card.addEventListener("dragover", (e) => {
    if (settingsMode && draggedCard && draggedCard !== card) {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      card.parentNode.insertBefore(draggedCard, card);
    }
  });

  card.addEventListener("drop", (e) => {
    e.preventDefault();
  });

  card.addEventListener("dragend", () => {
    draggedCard = null;
    rebuildScheduleFromDOM();
  });

  if (settingsMode) {
    card.classList.add("settings-mode");
    card.draggable = true;
  }

  return card;
}

function renderCards() {
  row1.innerHTML = "";
  row2.innerHTML = "";
  
  schedule.forEach((item, i) => {
    const card = createCardElement(item, i);
    if (i < 8) {
      row1.appendChild(card);
    } else {
      row2.appendChild(card);
    }
  });
}

function deleteCard(index) {
  const record = schedule[index];
  if (record && record.__backendId) {
    window.dataSdk.delete(record).catch(err => {
      console.error("Failed to delete record:", err);
    });
  }
  schedule.splice(index, 1);
  renderCards();
  updateHighlight();
}

function rebuildScheduleFromDOM() {

function parseTimeToMinutes(timeStr){
  let [h,m] = timeStr.split(":").map(Number);
  if(h>=1 && h<=6) h+=12;
  return h*60+m;
}

function getCentralMinutes(){
  const now = new Date();
  const formatter = new Intl.DateTimeFormat('en-US',{
    timeZone:'America/Chicago',
    hour:'2-digit',
    minute:'2-digit',
    hour12:false
  });
  const parts = formatter.formatToParts(now);
  const hour = parseInt(parts.find(p=>p.type==="hour").value);
  const minute = parseInt(parts.find(p=>p.type==="minute").value);
  return hour*60+minute;
}

function updateHighlight(){
  const now = getCentralMinutes();
  
  if(now < parseTimeToMinutes("7:15")){
    document.querySelectorAll(".schedule-card").forEach(card=>{
      card.classList.remove("active");
      card.classList.remove("completed");
    });
    
    document.getElementById("centerActivityName").textContent="-";
    document.getElementById("centerTimeRemaining").textContent="-";
    
    const timerMask = document.getElementById("timerMask");
    timerMask.style.height = "100%";
    
    const centerContainer = document.getElementById("centerSymbol");
    while(centerContainer.firstChild){
      centerContainer.removeChild(centerContainer.firstChild);
    }
    
    return;
  }
  
  let currentIndex = -1;

  for (let i = 0; i < schedule.length; i++) {
    const start = parseTimeToMinutes(schedule[i].time);
    const nextStart = i < schedule.length - 1
      ? parseTimeToMinutes(schedule[i + 1].time)
      : parseTimeToMinutes(schedule[0].time) + 1440;

    if (now >= start && now < nextStart) {
      currentIndex = i;
      break;
    }
  }

  document.querySelectorAll(".schedule-card").forEach(card=>{
    card.classList.remove("active");
    const cardIndex = parseInt(card.dataset.index);
    if(cardIndex < currentIndex){
      card.classList.add("completed");
    } else {
      card.classList.remove("completed");
    }
  });

  if(currentIndex!==-1){
    const activeCard = document.querySelector(`[data-index="${currentIndex}"]`);
    activeCard.classList.add("active");

    const centerContainer = document.getElementById("centerSymbol");
    
    while(centerContainer.firstChild){
      centerContainer.removeChild(centerContainer.firstChild);
    }
    
    const iconUrl = schedule[currentIndex].icon;
    if(iconUrl){
      const img = document.createElement("img");
      img.src = iconUrl;
      img.style.maxWidth = "250px";
      img.style.maxHeight = "250px";
      img.style.objectFit = "contain";
      img.loading = "lazy";
      img.addEventListener("error",()=>{
        img.remove();
        const fallback = document.createElement("div");
        fallback.style.width = "200px";
        fallback.style.height = "200px";
        fallback.style.background = "#ddd";
        fallback.style.borderRadius = "4px";
        centerContainer.appendChild(fallback);
      });
      centerContainer.appendChild(img);
    } else {
      const fallback = document.createElement("div");
      fallback.style.width = "200px";
      fallback.style.height = "200px";
      fallback.style.background = "#ddd";
      fallback.style.borderRadius = "4px";
      centerContainer.appendChild(fallback);
    }
    
    document.getElementById("centerActivityName").textContent=schedule[currentIndex].name;
    updateTimeRemaining(currentIndex);
  }
}

function calculateTimeRemaining(currentActivityIndex){
  const now = getCentralMinutes();
  const currentStart = parseTimeToMinutes(schedule[currentActivityIndex].time);

  let nextStart;

  if(currentActivityIndex < schedule.length - 1){
    nextStart = parseTimeToMinutes(schedule[currentActivityIndex + 1].time);
  } else {
    nextStart = parseTimeToMinutes(schedule[0].time) + 1440;
  }

  if(nextStart <= currentStart){
    nextStart += 1440;
  }

  let adjustedNow = now;
  if(adjustedNow < currentStart){
    adjustedNow += 1440;
  }

  let minutesRemaining = nextStart - adjustedNow;

  if(minutesRemaining < 0){
    minutesRemaining = 0;
  }

  const hours = Math.floor(minutesRemaining / 60);
  const minutes = minutesRemaining % 60;

  if(hours > 0){
    return `${hours} hr ${minutes} min remaining`;
  } else {
    return `${minutes} min remaining`;
  }
}

function updateTimeRemaining(currentActivityIndex){
  const timeRemainingEl = document.getElementById("centerTimeRemaining");
  timeRemainingEl.textContent = calculateTimeRemaining(currentActivityIndex);
  updateTimerMask(currentActivityIndex);
}

function updateTimerMask(currentActivityIndex){
  const timerMask = document.getElementById("timerMask");

  const now = getCentralMinutes();
  const currentStart = parseTimeToMinutes(schedule[currentActivityIndex].time);

  let nextStart;

  if(currentActivityIndex < schedule.length - 1){
    nextStart = parseTimeToMinutes(schedule[currentActivityIndex + 1].time);
  } else {
    nextStart = parseTimeToMinutes(schedule[0].time) + 1440;
  }

  if(nextStart <= currentStart){
    nextStart += 1440;
  }

  let adjustedNow = now;
  if(adjustedNow < currentStart){
    adjustedNow += 1440;
  }

  const totalDuration = nextStart - currentStart;
  const elapsed = adjustedNow - currentStart;

  const percentRemaining = Math.max(
    0,
    Math.min(100, ((totalDuration - elapsed) / totalDuration) * 100)
  );

  timerMask.style.height = percentRemaining + "%";
}

async function searchOpenSymbols(query){
  try {
    const response = await fetch(`https://www.opensymbols.org/api/v1/symbols/search?q=${encodeURIComponent(query)}`);
    const data = await response.json();
    return data.map(item => ({
      name: item.name || query,
      imageUrl: item.image_url
    }));
  } catch(err) {
    console.error("OpenSymbols search error:",err);
    return [];
  }
}

async function searchGlobalSymbols(query){
  try {
    const response = await fetch(`https://globalsymbols.com/api/v1/symbols?search=${encodeURIComponent(query)}&language=en`);
    const data = await response.json();
    return (data.symbols || []).map(item => ({
      name: query,
      imageUrl: item.picto.image_url
    }));
  } catch(err) {
    console.error("GlobalSymbols search error:",err);
    return [];
  }
}

async function performSymbolSearch(query,mode){
  if(!query) return;

  const resultsDiv = document.getElementById("symbolResults");
  resultsDiv.innerHTML = '<div class="loading-spinner">Searching...</div>';

  const [openResults,globalResults] = await Promise.all([
    searchOpenSymbols(query),
    searchGlobalSymbols(query)
  ]);

  const allResults = [...openResults,...globalResults];
  const uniqueResults = [];
  const seenImages = new Set();

  for(const result of allResults){
    const imageUrl = result.image_url || result.imageUrl;
    if(imageUrl && !seenImages.has(imageUrl)){
      seenImages.add(imageUrl);
      uniqueResults.push({
        name:result.name || query,
        imageUrl:imageUrl
      });
    }
  }

  if(uniqueResults.length===0){
    resultsDiv.innerHTML = '<div class="loading-spinner">No symbols found. Try another search.</div>';
    return;
  }

  let gridHTML = '<div class="symbol-grid">';
  for(const symbol of uniqueResults){
    gridHTML += `
      <div class="symbol-item" data-name="${symbol.name}" data-image="${symbol.imageUrl}">
        <img src="${symbol.imageUrl}" alt="${symbol.name}" loading="lazy" onerror="this.style.display='none';" />
      </div>
    `;
  }
  gridHTML += '</div>';
  resultsDiv.innerHTML = gridHTML;

  document.querySelectorAll(".symbol-item").forEach(item=>{
    item.addEventListener("click",()=>{
      const imageUrl = item.dataset.image;
      if(mode==="changeSymbol"){
        updateCardSymbolOnly(currentEditingCardIndex,imageUrl);
      } else if(mode==="searchCurrent"){
        updateCardSymbolOnly(currentEditingCardIndex,imageUrl);
      }
      closeSymbolModal();
    });
  });
}

function updateCardSymbolOnly(cardIndex,imageUrl){
  schedule[cardIndex].icon = imageUrl;

  const cardElement = document.querySelector(`[data-index="${cardIndex}"]`);
  if(cardElement){
    const container = cardElement.querySelector(".card-image-container");
    container.innerHTML = "";
    const img = document.createElement("img");
    img.src = imageUrl;
    img.style.maxWidth = "70px";
    img.style.maxHeight = "70px";
    img.style.objectFit = "contain";
    img.loading = "lazy";
    img.addEventListener("error",()=>{
      container.innerHTML = '<div style="width:60px;height:60px;background:#ddd;border-radius:4px;"></div>';
    });
    container.appendChild(img);
  }

  const now = getCentralMinutes();
  const start = parseTimeToMinutes(schedule[cardIndex].time);
  if(start<=now){
    let latest = -1;
    let currentIndex = -1;
    schedule.forEach((item,i)=>{
      const s = parseTimeToMinutes(item.time);
      if(s<=now && s>latest){
        latest = s;
        currentIndex = i;
      }
    });
    if(currentIndex===cardIndex){
      const centerContainer = document.getElementById("centerSymbol");
      
      while(centerContainer.firstChild){
        centerContainer.removeChild(centerContainer.firstChild);
      }
      
      const img = document.createElement("img");
      img.src = imageUrl;
      img.style.maxWidth = "250px";
      img.style.maxHeight = "250px";
      img.style.objectFit = "contain";
      img.loading = "lazy";
      img.addEventListener("error",()=>{
        img.remove();
        const fallback = document.createElement("div");
        fallback.style.width = "200px";
        fallback.style.height = "200px";
        fallback.style.background = "#ddd";
        fallback.style.borderRadius = "4px";
        centerContainer.appendChild(fallback);
      });
      centerContainer.appendChild(img);
    }
  }

  saveScheduleRecord(schedule[cardIndex]);
}

async function autoLoadSymbols(){
  for(let i=0;i<schedule.length;i++){
    if(schedule[i].icon){
      continue;
    }
    
    const activityName = schedule[i].name;
    
    let results = await searchOpenSymbols(activityName);
    if(results.length===0){
      results = await searchGlobalSymbols(activityName);
    }

    if(results.length>0){
      const imageUrl = results[0].imageUrl;
      schedule[i].icon = imageUrl;
      
      const cardElement = document.querySelector(`[data-index="${i}"]`);
      if(cardElement){
        const container = cardElement.querySelector(".card-image-container");
        container.innerHTML = "";
        
        const img = document.createElement("img");
        img.src = imageUrl;
        img.style.maxWidth = "70px";
        img.style.maxHeight = "70px";
        img.style.objectFit = "contain";
        img.loading = "lazy";
        img.addEventListener("error",()=>{
          container.innerHTML = '<div style="width:60px;height:60px;background:#ddd;border-radius:4px;"></div>';
        });
        container.appendChild(img);
      }
      
      await saveScheduleRecord(schedule[i]);
    }
  }
}

function createDraggableVideoFrame(videoId, videoName) {
  const frameId = `video-frame-${Date.now()}`;

   const frame = document.createElement("div");
   frame.className = "draggable-video-frame";
   frame.id = frameId;

   frame.style.width = "750px";
   frame.style.height = "470px";
   frame.style.left = "100px";
   frame.style.top = "100px";

   frame.style.display = "flex";
   frame.style.flexDirection = "column";
  
  const header = document.createElement("div");
  header.className = "video-frame-header";
  header.textContent = videoName;
  
  const closeBtn = document.createElement("button");
  closeBtn.className = "video-frame-close";
  closeBtn.textContent = "✕";
  closeBtn.addEventListener("click", () => {
    frame.remove();
    openVideoFrames.delete(frameId);
  });
  
  header.appendChild(closeBtn);
  
  const iframe = document.createElement("iframe");
  iframe.style.width = "100%";
  iframe.style.flex = "1";
  iframe.style.width = "100%";
  iframe.style.border = "none";
  iframe.src = `https://www.youtube.com/embed/${videoId}`;
  iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
  iframe.allowFullscreen = true;
  
  frame.appendChild(header);
  frame.appendChild(iframe);
  
  header.addEventListener("mousedown", (e) => {
    draggingFrame = frame;
    const rect = frame.getBoundingClientRect();
    dragOffsetX = e.clientX - rect.left;
    dragOffsetY = e.clientY - rect.top;
    header.style.cursor = "grabbing";
    e.preventDefault();
  });
  
  document.querySelector(".schedule-board").appendChild(frame);
  openVideoFrames.set(frameId, frame);
  
  return frame;
}

document.addEventListener("mousemove", (e) => {
  if (!draggingFrame) return;
  
  const board = document.querySelector(".schedule-board");
  const frameWidth = draggingFrame.offsetWidth;
  const frameHeight = draggingFrame.offsetHeight;
  const boardRect = board.getBoundingClientRect();
  
  let newLeft = e.clientX - boardRect.left - dragOffsetX;
  let newTop = e.clientY - boardRect.top - dragOffsetY;
  
  newLeft = Math.max(0, Math.min(newLeft, boardRect.width - frameWidth));
  newTop = Math.max(0, Math.min(newTop, boardRect.height - frameHeight));
  
  draggingFrame.style.left = newLeft + "px";
  draggingFrame.style.top = newTop + "px";
});

  if (draggingFrame) {
    draggingFrame.querySelector(".video-frame-header").style.cursor = "grab";
